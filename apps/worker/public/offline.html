<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#00F5D4" />
    <title>Offline — GigAI Bharat</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020810;
        --cyan: #00f5d4;
        --saffron: #ff9933;
        --text: #e8f7ff;
        --muted: #8aa4b8;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 0%, rgba(0, 245, 212, 0.12), transparent 55%),
          linear-gradient(180deg, #020810, #0a1420);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        border: 1px solid rgba(0, 245, 212, 0.25);
        border-radius: 24px;
        padding: 32px 24px;
        background: rgba(10, 20, 32, 0.85);
        box-shadow: 0 0 40px rgba(0, 245, 212, 0.08);
      }
      .pulse {
        width: 72px;
        height: 72px;
        margin: 0 auto 20px;
        border-radius: 20px;
        border: 2px solid rgba(255, 153, 51, 0.7);
        display: grid;
        place-items: center;
        animation: pulse 2s ease-in-out infinite;
      }
      .dot {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--cyan);
        box-shadow: 0 0 24px var(--cyan);
      }
      h1 { font-size: 1.5rem; margin-bottom: 8px; }
      p { color: var(--muted); line-height: 1.5; margin-bottom: 20px; }
      button {
        width: 100%;
        border: none;
        border-radius: 16px;
        padding: 14px 18px;
        font-weight: 600;
        font-size: 1rem;
        color: #020810;
        background: linear-gradient(135deg, #00f5d4, #00aaff);
        cursor: pointer;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.04); opacity: 0.85; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="pulse"><div class="dot"></div></div>
      <h1>You're offline</h1>
      <p>GigAI Bharat keeps your last session cached. Reconnect to sync earnings, dispatch, and wallet updates.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
