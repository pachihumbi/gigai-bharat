name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      skip_cache:
        description: "Redeploy without build cache"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches: [main]
    paths:
      - "apps/marketing/**"
      - "apps/worker/**"
      - "package-lock.json"
      - "scripts/prepare-worker-vercel-output.cjs"
      - ".github/workflows/deploy-production.yml"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-marketing:
    name: Marketing → www.bharatgig.live
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Validate Vercel secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}" || (echo "Missing VERCEL_TOKEN — see docs/GITHUB_SECRETS.md" && exit 1)
          test -n "${{ secrets.VERCEL_ORG_ID }}" || (echo "Missing VERCEL_ORG_ID" && exit 1)
          test -n "${{ secrets.VERCEL_MARKETING_PROJECT_ID }}" || (echo "Missing VERCEL_MARKETING_PROJECT_ID" && exit 1)

      - name: Build marketing (Nitro Vercel SSR)
        run: npm run build -w @gigai/marketing
        env:
          VERCEL: "1"
          VITE_SITE_URL: https://www.bharatgig.live

      - name: Verify Nitro output
        run: test -f apps/marketing/.vercel/output/config.json

      - name: Deploy marketing (prebuilt)
        working-directory: apps/marketing
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MARKETING_PROJECT_ID }}
        run: |
          npx vercel@latest deploy --prebuilt --prod --yes \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_cache == 'true' && '--force' || '' }}

      - name: Smoke test marketing routes
        run: |
          for url in \
            "https://www.bharatgig.live" \
            "https://www.bharatgig.live/investors" \
            "https://www.bharatgig.live/gurukul" \
            "https://www.bharatgig.live/shramsetu"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            echo "$url -> $code"
            test "$code" = "200"
          done

  deploy-worker:
    name: Worker → app.bharatgig.live
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Validate Vercel secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}" || (echo "Missing VERCEL_TOKEN — see docs/GITHUB_SECRETS.md" && exit 1)
          test -n "${{ secrets.VERCEL_ORG_ID }}" || (echo "Missing VERCEL_ORG_ID" && exit 1)
          test -n "${{ secrets.VERCEL_WORKER_PROJECT_ID }}" || (echo "Missing VERCEL_WORKER_PROJECT_ID" && exit 1)

      - name: Build worker
        run: npm run build -w @gigai/worker
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_LOVABLE_CONNECTOR_GOOGLE_MAPS_BROWSER_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}
          VITE_LOVABLE_CONNECTOR_GOOGLE_MAPS_TRACKING_ID: ${{ secrets.VITE_GOOGLE_MAPS_TRACKING_ID }}

      - name: Prepare worker Vercel output (SPA routing)
        run: node scripts/prepare-worker-vercel-output.cjs

      - name: Verify SPA output
        run: test -f .vercel/output/config.json

      - name: Deploy worker (prebuilt)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WORKER_PROJECT_ID }}
        run: |
          npx vercel@latest deploy --prebuilt --prod --yes \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_cache == 'true' && '--force' || '' }}

      - name: Smoke test worker routes
        run: |
          BASE="https://app.bharatgig.live"
          for path in "/" "/auth" "/auth/callback" "/dashboard" "/gurukul"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE$path")
            echo "$BASE$path -> $code"
            test "$code" = "200"
          done
