name: Deploy Production

# Marketing (www.bharatgig.live) → Spaceship shared hosting — see deployment/SPACESHIP.md
# Worker (app.bharatgig.live) → Vercel — this workflow deploys worker only

on:
  workflow_dispatch:
    inputs:
      skip_cache:
        description: "Redeploy without build cache"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "package-lock.json"
      - "scripts/prepare-worker-vercel-output.cjs"
      - ".github/workflows/deploy-production.yml"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  VERCEL_FORCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_cache == 'true' && '--force' || '' }}

jobs:
  deploy-worker:
    name: Worker → app.bharatgig.live (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build worker
        run: npm run build -w @gigai/worker
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_MAP_STYLE_URL: https://tiles.openfreemap.org/styles/dark

      - name: Prepare worker Vercel output (SPA routing)
        run: node scripts/prepare-worker-vercel-output.cjs

      - name: Deploy worker
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_WORKER_PROJECT_ID }}
          working-directory: .
          vercel-args: --prebuilt --prod ${{ env.VERCEL_FORCE }}
