name: Validate Production

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "scripts/health-check-production.mjs"
      - ".github/workflows/validate-production.yml"

jobs:
  smoke-test:
    name: Production URL smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run production health checks
        run: node scripts/health-check-production.mjs

      - name: Contact API security smoke
        run: node scripts/test-contact-api.mjs
