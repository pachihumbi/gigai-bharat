name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint worker
        run: npm run lint -w @gigai/worker

      - name: Typecheck packages
        run: npm run typecheck -w @gigai/types --if-present

      - name: Test worker
        run: npm run test -w @gigai/worker

      - name: Build worker
        run: npm run build -w @gigai/worker
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder

      - name: Build admin
        run: npm run build -w @gigai/admin
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder

      - name: Build marketing (Nitro Vercel SSR)
        run: npm run build -w @gigai/marketing
        env:
          VERCEL: "1"
          VITE_SITE_URL: https://www.bharatgig.live

      - name: Lint marketing
        run: npm run lint -w @gigai/marketing
